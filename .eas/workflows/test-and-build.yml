name: Test and Build

on:
  pull_request:
    branches: ['main']

jobs:
  test:
    name: Run Tests
    type: test
    script: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm run typecheck
      pnpm run test
  
  build_ios:
    name: Build iOS
    needs: test
    type: build
    params:
      platform: ios
      profile: preview
  
  build_android:
    name: Build Android
    needs: test
    type: build
    params:
      platform: android
      profile: preview
