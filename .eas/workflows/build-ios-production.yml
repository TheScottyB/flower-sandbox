name: iOS production build

# Manual trigger only. Re-enable push trigger by uncommenting `on.push` below
# once the build pipeline is reliably green and you want every main commit to
# spawn a build. Until then, run via `eas workflow:run build-ios-production.yml`
# or via the EAS dashboard.
on:
  workflow_dispatch:
  # push:
  #   branches: ['main']

jobs:
  build_ios:
    name: Build iOS
    type: build
    params:
      platform: ios
      profile: production
      channel: production
      autoSubmit: false
      # App configured with:
      # - Name: "FlowerSandbox"
      # - Bundle ID: "com.djscottyb.flowersandbox"
      # - Apple Team ID: "3X872JR6P3"
      # - App Store Connect app record: pending
      # - Submission is intentionally disabled until the ASC app exists.
