# Single-package "workspace" — required so pnpm accepts settings-only usage.
# Without packages:, EAS iOS (pnpm install --frozen-lockfile) errors with
# ERR_PNPM_INVALID_WORKSPACE_CONFIGURATION: packages field missing or empty.
packages:
  - .

allowBuilds:
  dtrace-provider: false
  msgpackr-extract: true

# Supply-chain defense: refuse packages younger than 7 days unless explicitly
# excluded. Catches typosquats and post-publish compromises. Was previously
# 0 (disabled) because Expo SDK 56 packages were freshly released — they're
# now well past 7 days, so the global guard is safe to re-enable.
minimumReleaseAge: 7
