name: Supabase Keep-Alive

# The flower-sandbox Supabase project (srtlalaecgejgghwwfmk) is on the free
# tier, which auto-pauses after ~1 week without API activity. A paused project
# stops resolving via DNS entirely, taking down sign-up/login/subscriptions in
# production — this is what caused the App Store rejection on 2026-05-26.
# This ping counts as project activity and prevents the pause.

on:
  schedule:
    - cron: '17 6 * * *' # daily at 06:17 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase auth health endpoint
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://srtlalaecgejgghwwfmk.supabase.co/auth/v1/health" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Auth health returned HTTP $status"
          if [ "$status" != "200" ]; then
            echo "::error::Supabase project unreachable (HTTP $status) — it may be paused. Restore it at https://supabase.com/dashboard/project/srtlalaecgejgghwwfmk"
            exit 1
          fi
