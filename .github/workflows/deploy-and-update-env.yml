name: Deploy and Update Environment Variables

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.env.supabase.ci'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to (production, staging)'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || 'production' }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck
        
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
        
      - name: Deploy Supabase functions
        run: |
          supabase functions deploy stripe-products --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy stripe-checkout --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy stripe-checkout-anonymous --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy stripe-webhook --no-verify-jwt --project-ref "$SUPABASE_PROJECT_ID"
        
      - name: Update Supabase secrets
        env:
          LIVE_STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          LIVE_STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          TEST_STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          TEST_STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}
        run: |
          if [ "$DEPLOY_ENV" = "staging" ]; then
            STRIPE_SECRET_KEY_VALUE="$TEST_STRIPE_SECRET_KEY"
            STRIPE_WEBHOOK_SECRET_VALUE="$TEST_STRIPE_WEBHOOK_SECRET"
          else
            STRIPE_SECRET_KEY_VALUE="$LIVE_STRIPE_SECRET_KEY"
            STRIPE_WEBHOOK_SECRET_VALUE="$LIVE_STRIPE_WEBHOOK_SECRET"
          fi

          if [ -z "$STRIPE_SECRET_KEY_VALUE" ] || [ -z "$STRIPE_WEBHOOK_SECRET_VALUE" ]; then
            echo "Missing Stripe secrets for $DEPLOY_ENV" >&2
            exit 1
          fi

          supabase secrets set \
            STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY_VALUE" \
            STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET_VALUE" \
            --project-ref "$SUPABASE_PROJECT_ID"
          
      - name: Verify Environment Setup
        run: |
          supabase functions list --project-ref "$SUPABASE_PROJECT_ID"
          supabase secrets list --project-ref "$SUPABASE_PROJECT_ID"
